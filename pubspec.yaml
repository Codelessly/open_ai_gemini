name: open_ai_gemini
description: >-
  A bidirectional translation layer between OpenAI and Google Gemini API
  specifications. Convert chat completions, tool calls, streaming responses,
  and thinking/reasoning tokens between the two formats.
version: 0.1.0
repository: https://github.com/Codelessly/open_ai_gemini
issue_tracker: https://github.com/Codelessly/open_ai_gemini/issues
topics:
  - ai
  - gemini
  - openai
  - llm
  - translation

environment:
  sdk: ^3.11.0

dependencies:
  googleai_dart: ^3.3.1
  http: ">=1.4.0 <2.0.0"
  meta: ">=1.17.0 <2.0.0"
  openai_dart: ^1.3.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
